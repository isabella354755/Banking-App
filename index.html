<!DOCTYPE html>
<html>
<head>
  <title>Banking App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="top">
    <div class="lock">🔒</div>
    <div class="logo">SecureBank</div>
    <a href="#">Cookie<br>Policy</a>
  </div>

  <div id="loginPage" class="page">
    <h2>Online Banking Login</h2>

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <div class="password-box">
      <input type="password" id="password">
      <button onclick="showPassword()">Show</button>
    </div>

    <div class="remember">
      <input type="checkbox">
      <span>Remember my User ID</span>
    </div>

    <button class="main-btn" onclick="login()">Continue</button>
    <button class="text-btn" onclick="createAccount()">Create Account</button>
    <button class="text-btn" onclick="forgotPassword()">Forgot Password?</button>

    <p id="loginMessage"></p>
  </div>

  <div id="bankPage" class="page hidden">
    <h2>Welcome, <span id="displayName"></span></h2>

    <div class="balance-card">
      <p>Available Balance</p>
      <h1>$<span id="balance">0.00</span></h1>
    </div>

    <label>Amount</label>
    <input type="number" id="amount">

    <button class="main-btn" onclick="deposit()">Deposit</button>
    <button class="main-btn" onclick="withdraw()">Withdraw</button>
    <button class="text-btn" onclick="showBalance()">Show Final Balance</button>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <p id="bankMessage"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
